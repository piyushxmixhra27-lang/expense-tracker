<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop text-on-surface antialiased">
<div class="w-full grid grid-cols-1 gap-0 rounded-2xl overflow-hidden glass-panel relative max-w-[450px] animate-fade-in animate-slide-up">
<!-- Subtle inner glow effect -->
<div class="absolute inset-0 border border-white/5 rounded-2xl pointer-events-none z-10"></div>
<!-- Left: Branding & Illustration -->

<!-- Right: Login Form -->
<div class="p-margin-mobile md:p-lg flex flex-col justify-center relative z-20">
<div class="flex items-center gap-sm mb-lg justify-center text-center">
<span class="material-symbols-outlined text-primary text-[28px] font-[FILL=1]">account_balance_wallet</span>
<h1 class="font-headline-md text-headline-md text-on-surface">Wisdom</h1>
</div>
<div class="mb-lg text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter your credentials to access your dashboard.</p>
</div>
<form class="space-y-md" method="POST" action="{{ url_for('login') }}">
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">person</span>
<input class="w-full bg-[#1A1A1A] border border-white/10 rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all duration-300" id="username" name="username" placeholder="admin@company.com" type="text">
</div>
</div>
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full bg-[#1A1A1A] border border-white/10 rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password">
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded bg-[#1A1A1A] border-white/10 text-[#FF3B30] focus:ring-[#FF3B30]/50 focus:ring-offset-[#131313]" id="remember-me" name="remember-me" type="checkbox">
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember me
                        </label>
</div>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">
                        Forgot Password?
                    </a>
</div>
<button class="w-full bg-[#FF3B30] hover:bg-[#FF3B30]/90 text-white font-label-md text-label-md py-sm rounded-lg transition-all duration-300 flex items-center justify-center gap-xs shadow-[0_0_15px_rgba(255,59,48,0.3)] hover:shadow-[0_0_25px_rgba(255,59,48,0.5)] btn-premium" type="submit">
<span class="">Login</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/40 uppercase tracking-widest">
                    Authorized Personnel Only
                </p>
</div>
</div>
</div>


</body></html>
